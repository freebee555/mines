<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扫雷</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cell-size: 30px;
  --cell-font: 15px;
  /* Light theme palette (Win98 classic). Overridden in dark mode below. */
  --bg: #e0e0e0;
  --panel: #d0d0d0;
  --cell-bg: #c0c0c0;
  --cell-rev-bg: #b0b0b0;
  --cell-mine-shown-bg: #c0c0c0;
  --border-light: #fff;
  --border-dark: #808080;
  --lcd-bg: #222;
  --lcd-fg: #f00;
  --hint-fg: #555;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1e;
    --panel: #2a2a2a;
    --cell-bg: #3a3a3a;
    --cell-rev-bg: #1f1f1f;
    --cell-mine-shown-bg: #2a2a2a;
    --border-light: #555;
    --border-dark: #111;
    --hint-fg: #aaa;
  }
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: #ddd;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
}
.game {
  background: var(--panel);
  border: 3px solid var(--border-light);
  border-right-color: var(--border-dark);
  border-bottom-color: var(--border-dark);
  padding: 10px;
  border-radius: 2px;
  max-width: 100vw;
  /* Shrink-wrap to the widest child (the board) so the header can never
     stretch the container wider than the board itself. */
  width: max-content;
}
.header {
  display: flex;
  align-items: stretch;
  margin-bottom: 8px;
  gap: 6px;
}
/* counter/timer absorb leftover space; square buttons stay their natural
   fixed width. This keeps the LCD readable while the board's width still
   drives the overall .game container. */
.header > .counter, .header > .timer { flex: 1 1 0; min-width: 54px; }
.counter, .timer {
  background: var(--lcd-bg);
  color: var(--lcd-fg);
  font-family: 'Courier New', monospace;
  font-size: clamp(20px, 5vw, 28px);
  font-weight: bold;
  padding: 2px 6px;
  text-align: center;
  border: 2px solid var(--border-dark);
  border-right-color: var(--border-light);
  border-bottom-color: var(--border-light);
}
.emoji-btn {
  flex: 0 0 auto;
  width: clamp(36px, 8vw, 42px);
  height: clamp(36px, 8vw, 42px);
  font-size: clamp(20px, 5vw, 24px);
  line-height: clamp(36px, 8vw, 42px);
  text-align: center;
  cursor: pointer;
  border: 2px solid var(--border-light);
  border-right-color: var(--border-dark);
  border-bottom-color: var(--border-dark);
  background: var(--cell-bg);
}
.emoji-btn:active { border-color: var(--border-dark); border-right-color: var(--border-light); border-bottom-color: var(--border-light); }
.mode-toggle {
  flex: 0 0 auto;
  width: clamp(36px, 8vw, 42px);
  height: clamp(36px, 8vw, 42px);
  font-size: clamp(18px, 4vw, 22px);
  line-height: clamp(36px, 8vw, 42px);
  text-align: center;
  cursor: pointer;
  border: 2px solid var(--border-light);
  border-right-color: var(--border-dark);
  border-bottom-color: var(--border-dark);
  background: var(--cell-bg);
}
.mode-toggle.dig { background: #c8d8e8; }
.mode-toggle.flag { background: #f0d0d0; }
.mode-toggle:active { border-color: var(--border-dark); border-right-color: var(--border-light); border-bottom-color: var(--border-light); }
.sfx-toggle {
  flex: 0 0 auto;
  width: clamp(28px, 6vw, 34px); height: clamp(28px, 6vw, 34px);
  font-size: clamp(14px, 3vw, 18px); line-height: clamp(28px, 6vw, 34px);
  text-align: center; cursor: pointer;
  border: 2px solid var(--border-light);
  border-right-color: var(--border-dark);
  border-bottom-color: var(--border-dark);
  background: var(--cell-bg);
}
.sfx-toggle:active { border-color: var(--border-dark); border-right-color: var(--border-light); border-bottom-color: var(--border-light); }
.difficulty-bar {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 8px;
}
.diff-btn {
  padding: 4px 10px;
  cursor: pointer;
  font-size: clamp(11px, 2.5vw, 14px);
  border: 2px solid var(--border-light);
  border-right-color: var(--border-dark);
  border-bottom-color: var(--border-dark);
  background: var(--cell-bg);
  white-space: nowrap;
}
.diff-btn:active { border-color: var(--border-dark); border-right-color: var(--border-light); border-bottom-color: var(--border-light); }
.diff-btn.active {
  border-color: var(--border-dark);
  border-right-color: var(--border-light);
  border-bottom-color: var(--border-light);
  background: var(--cell-rev-bg);
}
.board-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 3px solid var(--border-dark);
  border-right-color: var(--border-light);
  border-bottom-color: var(--border-light);
}
.board { display: grid; }
.cell {
  /* Reset native <button> defaults so the classic raised look is preserved. */
  padding: 0;
  margin: 0;
  -webkit-appearance: none;
  appearance: none;
  font-family: inherit;
  color: inherit;
  width: var(--cell-size);
  height: var(--cell-size);
  font-size: var(--cell-font);
  font-weight: bold;
  line-height: var(--cell-size);
  text-align: center;
  cursor: pointer;
  border: 2px solid var(--border-light);
  border-right-color: var(--border-dark);
  border-bottom-color: var(--border-dark);
  background: var(--cell-bg);
  touch-action: manipulation;
  position: relative;
}
.cell:focus { outline: none; box-shadow: inset 0 0 0 2px #4a90d9; }
.cell:focus:not(:focus-visible) { box-shadow: none; }
.cell.revealed {
  border: 1px solid var(--border-dark);
  background: var(--cell-rev-bg);
}
.cell:active:not(.revealed) { border-color: var(--border-dark); border-right-color: var(--border-light); border-bottom-color: var(--border-light); }
.cell.mine-hit { background: #f00 !important; }
.cell.mine-shown { background: var(--cell-mine-shown-bg); }
.cell.flag-wrong { background: #f88; }
.cell.pressing {
  animation: press-grow 0.4s linear forwards;
  z-index: 10;
}
@keyframes press-grow {
  0%   { box-shadow: 0 0 0 0 rgba(74,144,217,0.5); }
  100% { box-shadow: 0 0 0 12px rgba(74,144,217,0.7); background: #c8d0e0; }
}
.n1 { color: #00f; }
.n2 { color: #008000; }
.n3 { color: var(--lcd-fg); }
.n4 { color: #000080; }
.n5 { color: #800000; }
.n6 { color: #008080; }
.n7 { color: #000; }
.n8 { color: #808080; }
@media (prefers-color-scheme: dark) {
  /* Bump n7/n8 to lighter shades so they remain readable on dark cells. */
  .n7 { color: #ddd; }
  .n8 { color: #aaa; }
}
.hint { text-align: center; margin-top: 6px; font-size: clamp(11px, 2.5vw, 13px); color: var(--hint-fg); }
.hint .m { display: none; }

#pauseOverlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.55); color: #fff; z-index: 999;
  flex-direction: column; justify-content: center; align-items: center;
  font-size: clamp(28px, 6vw, 42px); font-weight: bold; letter-spacing: 2px;
  pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
#pauseOverlay .sub { font-size: clamp(12px, 3vw, 16px); font-weight: normal; margin-top: 8px; opacity: 0.8; }

.flash-best { animation: flash-best 1.2s ease-out; }
@keyframes flash-best {
  0%   { color: #0f0; text-shadow: 0 0 10px #0f0; transform: scale(1.1); }
  100% { color: var(--lcd-fg); text-shadow: none; transform: scale(1); }
}

#confetti {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; overflow: hidden; z-index: 1000;
}
.confetti-piece {
  position: absolute;
  animation: confetti-fall linear forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg) scale(0.3); opacity: 0; }
}
</style>
</head>
<body>
<div id="confetti"></div>
<div id="pauseOverlay"><div>⏸ 已暂停</div><div class="sub">切回此页面自动继续</div></div>
<div class="game">
  <div class="header">
    <div class="counter" id="counter">000</div>
    <div class="mode-toggle dig" id="modeToggle" onclick="toggleMode()">⛏️</div>
    <div class="emoji-btn" id="face" onclick="newGame()" onmousedown="facePress()" onmouseup="faceRelease()" onmouseleave="faceRelease()" ontouchstart="facePress()" ontouchend="faceRelease()">🙂</div>
    <div class="sfx-toggle" id="sfxToggle" onclick="toggleSfx()" title="声音开关">🔊</div>
    <div class="timer" id="timer">000</div>
  </div>
  <div class="difficulty-bar">
    <button id="btn-easy" class="diff-btn active" onclick="setDifficulty('easy')">简单</button>
    <button id="btn-medium" class="diff-btn" onclick="setDifficulty('medium')">中等</button>
    <button id="btn-hard" class="diff-btn" onclick="setDifficulty('hard')">困难</button>
  </div>
  <div class="board-wrap"><div class="board" id="board" role="grid" aria-label="扫雷棋盘"></div></div>
  <div class="hint" id="hintText">
    <span class="d">左键翻开 | 右键插旗 | 双击数字快速翻开 | 方向键移动 F 插旗 Esc 重开</span>
    <span class="m">⛏点击翻开/长按插旗 | 🚩点击插旗/长按翻开 | 点数字快速翻开</span>
  </div>
</div>

<script>
(function() {
  var D = {
    easy:   { rows:9,  cols:9,  mines:10, label:'简单' },
    medium: { rows:16, cols:16, mines:40, label:'中等' },
    hard:   { rows:16, cols:30, mines:99, label:'困难' }
  };
  var TARGET_CELL = 38;
  var MIN_CELL = 30;
  var CHROME_W = 40;
  var CHROME_H = 160;

  var IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  var LP_MS = 400;

  var diff = 'easy', R, C, M, cellSz;
  var board = [], over = false, won = false, first = true;
  var timerId = null, sec = 0, flags = 0, flagMode = false;

  var lpTimer = null, lpDone = false, lpCell = null, lpHandled = false;
  var tsX = 0, tsY = 0, skipClick = false, pressCell = null;

  function P(n,l) { return String(n).padStart(l,'0'); }
  function updC() { document.getElementById('counter').textContent = P(M - flags, 3); }
  function updT() { document.getElementById('timer').textContent = P(Math.min(sec, 999), 3); }

  // Face emoji state machine. Centralized so mouse-press can override the
  // 'base' emoji (idle / win / lose) without fighting inline assignments.
  // base = '🙂' (idle), '😎' (win), '😱' (lose), '😮' is transient.
  var faceBase = '\uD83D\uDE42';
  function setFace(e) { faceBase = e; if (!facePressed) document.getElementById('face').textContent = e; }
  var facePressed = false;
  function facePress() { facePressed = true; document.getElementById('face').textContent = '\uD83D\uDE2E'; }
  function faceRelease() { facePressed = false; document.getElementById('face').textContent = faceBase; }

  // Web Audio sfx. Lazily created on first user gesture (autoplay policy).
  // All sounds are short, synthesized — no asset files required.
  var audioCtx = null;
  var sfxOn = true;
  function sfx(name) {
    if (!sfxOn) return;
    try {
      if (!audioCtx) {
        var Ctor = window.AudioContext || window.webkitAudioContext;
        if (!Ctor) return;
        audioCtx = new Ctor();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      var t0 = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      if (name === 'reveal') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(420, t0);
        gain.gain.setValueAtTime(0.08, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.06);
        osc.start(t0); osc.stop(t0 + 0.06);
      } else if (name === 'flag') {
        osc.type = 'square'; osc.frequency.setValueAtTime(560, t0);
        gain.gain.setValueAtTime(0.05, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.05);
        osc.start(t0); osc.stop(t0 + 0.05);
      } else if (name === 'explode') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, t0);
        osc.frequency.exponentialRampToValueAtTime(40, t0 + 0.4);
        gain.gain.setValueAtTime(0.18, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);
        osc.start(t0); osc.stop(t0 + 0.4);
      } else if (name === 'win') {
        // Rising arpeggio: C5 E5 G5 C6
        var notes = [523, 659, 784, 1047];
        notes.forEach(function(freq, i) {
          var o = audioCtx.createOscillator();
          var g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'triangle'; o.frequency.setValueAtTime(freq, t0 + i*0.08);
          g.gain.setValueAtTime(0, t0 + i*0.08);
          g.gain.linearRampToValueAtTime(0.08, t0 + i*0.08 + 0.01);
          g.gain.exponentialRampToValueAtTime(0.001, t0 + i*0.08 + 0.18);
          o.start(t0 + i*0.08); o.stop(t0 + i*0.08 + 0.2);
        });
      }
    } catch (e) { /* audio failed — silent fallback */ }
  }

  // Per-difficulty stats persisted in localStorage. Key: mines_stats_v1.
  // Shape: { easy: { best, total, wins }, medium: {...}, hard: {...} }
  var STATS_KEY = 'mines_stats_v1';
  var stats = { easy:{best:null,total:0,wins:0}, medium:{best:null,total:0,wins:0}, hard:{best:null,total:0,wins:0} };
  function loadStats() {
    try {
      var raw = localStorage.getItem(STATS_KEY);
      if (!raw) return;
      var parsed = JSON.parse(raw);
      ['easy','medium','hard'].forEach(function(k) {
        if (parsed[k] && typeof parsed[k] === 'object') stats[k] = parsed[k];
      });
    } catch (e) { /* localStorage may be disabled — silent fallback */ }
  }
  function saveStats() {
    try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch (e) {}
  }
  // Record the outcome of a finished game. newBest=true flashes the counter.
  function recordResult(d, didWin, seconds) {
    var s = stats[d];
    s.total += 1;
    if (didWin) {
      s.wins += 1;
      if (s.best === null || seconds < s.best) {
        s.best = seconds;
        return true; // new best
      }
    }
    return false;
  }
  // Brief green flash on the counter when a new best is set.
  function flashCounter() {
    var el = document.getElementById('counter');
    el.classList.add('flash-best');
    setTimeout(function() { el.classList.remove('flash-best'); }, 1200);
  }
  loadStats();
  // Restore sfx preference (default: on).
  try {
    var sfxPref = localStorage.getItem('mines_sfx');
    if (sfxPref === '0') { sfxOn = false; document.getElementById('sfxToggle').textContent = '\uD83D\uDD07'; }
  } catch (e) {}
  function toggleSfx() {
    sfxOn = !sfxOn;
    document.getElementById('sfxToggle').textContent = sfxOn ? '\uD83D\uDD0A' : '\uD83D\uDD07';
    try { localStorage.setItem('mines_sfx', sfxOn ? '1' : '0'); } catch (e) {}
    if (sfxOn) sfx('reveal');
  }

  function startT() { sec = 0; updT(); if (timerId) clearInterval(timerId); timerId = setInterval(function() { sec++; updT(); }, 1000); }
  function stopT() { if (timerId) { clearInterval(timerId); timerId = null; } }

  // Auto-pause when the tab is hidden, auto-resume when it returns.
  // We remember the paused state so the resume handler knows whether to
  // re-start the interval or no-op (game already over, or never started).
  var paused = false;
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      if (timerId && !over) {
        stopT();
        paused = true;
        showPauseOverlay(true);
      }
    } else if (paused) {
      paused = false;
      showPauseOverlay(false);
      if (!over && !first) startT();
    }
  });
  function showPauseOverlay(on) {
    var el = document.getElementById('pauseOverlay');
    if (el) el.style.display = on ? 'flex' : 'none';
  }

  function adaptCfg(cfg) {
    var availW = window.innerWidth - CHROME_W;
    var availH = window.innerHeight - CHROME_H;

    // Cap at original size, but use all available space independently per axis
    var cols = Math.min(cfg.cols, Math.floor(availW / TARGET_CELL));
    var rows = Math.min(cfg.rows, Math.floor(availH / TARGET_CELL));

    var density = cfg.mines / (cfg.cols * cfg.rows);
    var mines = Math.max(1, Math.floor(cols * rows * density));

    var cw = Math.floor(availW / cols);
    var ch = Math.floor(availH / rows);
    var sz = Math.min(cw, ch, TARGET_CELL);
    if (sz < MIN_CELL) sz = MIN_CELL;

    return { rows:rows, cols:cols, mines:mines, cellSize:sz };
  }

  function applySize() {
    document.documentElement.style.setProperty('--cell-size', cellSz + 'px');
    document.documentElement.style.setProperty('--cell-font', Math.max(10, Math.floor(cellSz * 0.5)) + 'px');
  }

  function updateLabels() {
    var btns = {
      easy:   document.getElementById('btn-easy'),
      medium: document.getElementById('btn-medium'),
      hard:   document.getElementById('btn-hard')
    };
    Object.keys(D).forEach(function(k) {
      var ad = adaptCfg(D[k]);
      btns[k].textContent = D[k].label + ' ' + ad.cols + '\u00D7' + ad.rows;
      // Hover title shows best time + win rate for that difficulty.
      var s = stats[k];
      var bestStr = s.best === null ? '无' : (s.best + 's');
      var rateStr = s.total === 0 ? '—' : Math.round(100 * s.wins / s.total) + '%';
      btns[k].title = '最佳: ' + bestStr + '  |  胜率: ' + rateStr + ' (' + s.wins + '/' + s.total + ')';
    });
  }

  function newGame() {
    var ad = adaptCfg(D[diff]);
    R = ad.rows; C = ad.cols; M = ad.mines; cellSz = ad.cellSize;
    board = []; over = false; won = false; first = true; flags = 0;
    stopT(); sec = 0; updT(); updC();
    setFace('\uD83D\uDE42');
    applySize();
    for (var r = 0; r < R; r++) {
      board[r] = [];
      for (var c = 0; c < C; c++) board[r][c] = { mine:false, num:0, rev:false, flg:false, hit:false };
    }
    render();
  }

  function placeMines(sr, sc) {
    var safe = new Set();
    for (var dr = -1; dr <= 1; dr++)
      for (var dc = -1; dc <= 1; dc++) {
        var nr = sr + dr, nc = sc + dc;
        if (nr >= 0 && nr < R && nc >= 0 && nc < C) safe.add(nr * C + nc);
      }
    var pool = [];
    for (var r = 0; r < R; r++)
      for (var c = 0; c < C; c++)
        if (!safe.has(r * C + c)) pool.push(r * C + c);
    for (var i = pool.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = pool[i]; pool[i] = pool[j]; pool[j] = t; }
    for (var i = 0; i < M && i < pool.length; i++) {
      var rr = Math.floor(pool[i] / C), cc = pool[i] % C;
      board[rr][cc].mine = true;
    }
    for (var r = 0; r < R; r++)
      for (var c = 0; c < C; c++) {
        if (board[r][c].mine) continue;
        var n = 0;
        for (var dr = -1; dr <= 1; dr++)
          for (var dc = -1; dc <= 1; dc++) {
            var nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < R && nc >= 0 && nc < C && board[nr][nc].mine) n++;
          }
        board[r][c].num = n;
      }
  }

  function render() {
    var be = document.getElementById('board');
    be.style.gridTemplateColumns = 'repeat(' + C + ', var(--cell-size))';
    be.style.gridTemplateRows = 'repeat(' + R + ', var(--cell-size))';
    be.innerHTML = '';
    for (let r = 0; r < R; r++) {
      for (let c = 0; c < C; c++) {
        let el = document.createElement('button');
        el.type = 'button'; // prevent implicit form-submit semantics
        el.className = 'cell';
        el.dataset.r = r;
        el.dataset.c = c;
        // Default aria-label is filled in by delOne() with full state.
        el.setAttribute('aria-label', '第 ' + (r+1) + ' 行第 ' + (c+1) + ' 列');
        el.addEventListener('click', function(evt) { cellClick(evt, r, c); });
        el.addEventListener('dblclick', function() { dblClick(r, c); });
        el.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          if (IS_TOUCH) {
            if (lpDone) return;
            if (lpTimer) clearTimeout(lpTimer);
            lpHandled = true; lpDone = true; skipClick = true;
            clearRing();
            cellRightAction(r, c);
          } else {
            rightClick(r, c);
          }
        });
        if (IS_TOUCH) {
          el.addEventListener('touchstart', function(e) { tsStart(e, r, c); }, { passive: false });
          el.addEventListener('touchend', function(e) { tsEnd(e, r, c); }, { passive: false });
          el.addEventListener('touchmove', function(e) { tsMove(e); }, { passive: false });
        }
        be.appendChild(el);
      }
    }
    delAll();
  }

  function getCell(r, c) { return document.querySelector('.cell[data-r="' + r + '"][data-c="' + c + '"]'); }

  function delOne(r, c) {
    var el = getCell(r, c); if (!el) return;
    var d = board[r][c];
    el.className = 'cell';
    // Reset focus-only styles every redraw (focus may persist across paints).
    var aria = '第 ' + (r+1) + ' 行第 ' + (c+1) + ' 列，';
    if (d.rev) {
      el.classList.add('revealed');
      if (d.mine) {
        el.classList.add(d.hit ? 'mine-hit' : 'mine-shown');
        el.textContent = '\uD83D\uDCA3';
        aria += d.hit ? '踩中的雷' : '揭示的雷';
      }
      else if (d.num > 0) {
        el.classList.add('n' + d.num);
        el.textContent = d.num;
        aria += '数字 ' + d.num;
      }
      else {
        el.textContent = '';
        aria += '空白';
      }
    } else if (d.flg) {
      el.textContent = '\uD83D\uDEA9';
      aria += '已插旗';
      if (over && !d.mine) {
        el.classList.add('flag-wrong');
        aria += '（插错）';
      }
    } else {
      el.textContent = '';
      aria += '未翻开';
    }
    el.setAttribute('aria-label', aria);
  }

  function delAll() { for (var r = 0; r < R; r++) for (var c = 0; c < C; c++) delOne(r, c); }

  function revealEmpty(r, c) {
    var stack = [[r, c]];
    while (stack.length > 0) {
      var cr = stack[stack.length - 1][0], cc = stack[stack.length - 1][1]; stack.pop();
      if (board[cr][cc].rev || board[cr][cc].flg) continue;
      board[cr][cc].rev = true;
      if (board[cr][cc].num === 0)
        for (var dr = -1; dr <= 1; dr++)
          for (var dc = -1; dc <= 1; dc++) {
            var nr = cr + dr, nc = cc + dc;
            if (nr >= 0 && nr < R && nc >= 0 && nc < C && !board[nr][nc].rev && !board[nr][nc].flg)
              stack.push([nr, nc]);
          }
    }
  }

  function chkWin() {
    // Classic Minesweeper win condition: all non-mine cells revealed.
    // Flag-based win was redundant and could let players "win" without
    // actually clearing the board.
    for (var r = 0; r < R; r++)
      for (var c = 0; c < C; c++) {
        var cl = board[r][c];
        if (!cl.mine && !cl.rev) return false;
      }
    won = true; over = true; stopT();
    setFace('\uD83D\uDE0E');
    sfx('win');
    // Persist result; flash counter if a new best was achieved.
    if (recordResult(diff, true, sec)) flashCounter();
    saveStats();
    // Auto-flag any remaining unflagged mines for visual completeness.
    for (var r = 0; r < R; r++)
      for (var c = 0; c < C; c++)
        if (board[r][c].mine && !board[r][c].flg) board[r][c].flg = true;
    flags = M; updC(); delAll();
    confetti();
    return true;
  }

  function leftClick(r, c) {
    if (over) return;
    var cl = board[r][c];
    if (cl.flg || cl.rev) return;
    if (first) { first = false; placeMines(r, c); startT(); }
    if (cl.mine) {
      cl.rev = true; cl.hit = true; over = true; stopT();
      setFace('\uD83D\uDE35');
      sfx('explode');
      recordResult(diff, false, sec); saveStats();
      for (var rr = 0; rr < R; rr++) for (var cc = 0; cc < C; cc++) if (board[rr][cc].mine) board[rr][cc].rev = true;
      delAll(); return;
    }
    if (cl.num === 0) revealEmpty(r, c); else cl.rev = true;
    delAll();
    sfx('reveal');
    chkWin();
  }

  function rightClick(r, c) {
    if (over) return;
    var cl = board[r][c];
    if (cl.rev) return;
    // Note: do NOT trigger first-click mine placement here. Mines are placed
    // on the first REVEAL so the safe 3x3 zone is centered on a real click.
    // Start the timer on first interaction (flag or reveal) for fairness.
    if (first && !timerId) startT();
    // Enforce flag cap: classic Minesweeper refuses to plant a new flag
    // once you already have M flags down, even if some are on safe cells.
    if (!cl.flg && flags >= M) return;
    cl.flg = !cl.flg;
    flags += cl.flg ? 1 : -1;
    sfx('flag');
    updC(); delOne(r, c);
  }

  function dblClick(r, c) {
    if (over) return;
    var cl = board[r][c];
    if (!cl.rev || cl.num === 0) return;
    var fc = 0;
    for (var dr = -1; dr <= 1; dr++)
      for (var dc = -1; dc <= 1; dc++) {
        var nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < R && nc >= 0 && nc < C && board[nr][nc].flg) fc++;
      }
    if (fc !== cl.num) return;
    var hit = false;
    for (var dr = -1; dr <= 1; dr++)
      for (var dc = -1; dc <= 1; dc++) {
        var nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < R && nc >= 0 && nc < C && !board[nr][nc].rev && !board[nr][nc].flg) {
          if (board[nr][nc].mine) { hit = true; board[nr][nc].hit = true; }
          if (board[nr][nc].num === 0) revealEmpty(nr, nc); else board[nr][nc].rev = true;
        }
      }
    if (hit) {
      over = true; stopT();
      setFace('\uD83D\uDE35');
      sfx('explode');
      recordResult(diff, false, sec); saveStats();
      for (var rr = 0; rr < R; rr++) for (var cc = 0; cc < C; cc++) if (board[rr][cc].mine) board[rr][cc].rev = true;
    }
    delAll(); if (!hit) chkWin();
  }

  function addRing(r, c) { clearRing(); pressCell = getCell(r, c); if (pressCell) pressCell.classList.add('pressing'); }
  function clearRing() { if (pressCell) { pressCell.classList.remove('pressing'); pressCell = null; } }

  function tsStart(e, r, c) {
    if (over) return;
    clearRing();
    tsX = e.touches[0].clientX; tsY = e.touches[0].clientY;
    lpDone = false; lpHandled = false; skipClick = false;
    lpCell = { r: r, c: c };
    if (lpTimer) clearTimeout(lpTimer);
    if (board[r][c].rev) return;
    addRing(r, c);
    lpTimer = setTimeout(function() {
      if (lpHandled) { clearRing(); return; }
      lpDone = true; skipClick = true; clearRing();
      if (navigator.vibrate) navigator.vibrate(20);
      cellRightAction(r, c);
    }, LP_MS);
  }

  function tsMove(e) {
    if (!e.touches.length) return;
    if (Math.abs(e.touches[0].clientX - tsX) > 12 || Math.abs(e.touches[0].clientY - tsY) > 12) {
      if (lpTimer) clearTimeout(lpTimer);
      lpDone = false; skipClick = false; clearRing();
    }
  }

  function tsEnd(e, r, c) {
    if (lpTimer) clearTimeout(lpTimer);
    clearRing();
    if (lpDone) {
      var lr = lpCell ? lpCell.r : r;
      var lc = lpCell ? lpCell.c : c;
      lpDone = false; lpCell = null;
      requestAnimationFrame(function() { delOne(lr, lc); });
      return;
    }
    lpCell = null;
  }

  function cellClick(evt, r, c) {
    if (over) return;
    if (skipClick) { skipClick = false; return; }
    var cl = board[r][c];
    if (IS_TOUCH && cl.rev && cl.num > 0) { dblClick(r, c); return; }
    if (flagMode && !cl.rev) rightClick(r, c);
    else leftClick(r, c);
  }

  function cellRightAction(r, c) {
    var cl = board[r][c];
    if (cl.rev) return;
    if (flagMode) leftClick(r, c); else rightClick(r, c);
  }

  function toggleMode() {
    flagMode = !flagMode;
    var btn = document.getElementById('modeToggle');
    btn.textContent = flagMode ? '\uD83D\uDEA9' : '\u26CF\uFE0F';
    btn.className = 'mode-toggle ' + (flagMode ? 'flag' : 'dig');
  }

  function setDifficulty(d) {
    diff = d;
    var btns = document.querySelectorAll('.diff-btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + d).classList.add('active');
    newGame();
  }

  function confetti() {
    var ct = document.getElementById('confetti');
    // Clear any leftover pieces from a previous quick win so they don't pile up.
    ct.innerHTML = '';
    var colors = ['#ff0','#f0f','#0ff','#f00','#0f0','#00f','#ff8800','#ff0088','#88ff00','#00ff88'];
    var shapes = ['\u25a0','\u25cf','\u25b2','\u2605','\u2666'];
    var n = 80;
    for (var i = 0; i < n; i++) {
      (function(idx) {
        setTimeout(function() {
          var p = document.createElement('div');
          p.className = 'confetti-piece';
          p.textContent = shapes[Math.floor(Math.random() * shapes.length)];
          p.style.left = Math.random() * 100 + '%';
          p.style.top = -(Math.random() * 10 + 2) + '%';
          p.style.color = colors[Math.floor(Math.random() * colors.length)];
          p.style.fontSize = (Math.random() * 16 + 10) + 'px';
          p.style.animationDuration = (Math.random() * 2 + 2) + 's';
          ct.appendChild(p);
          setTimeout(function() { p.remove(); }, 4000);
        }, idx * 30);
      })(i);
    }
  }

  // Debounced resize handler:
  //   - Always updates difficulty button labels and CSS cell size (cheap).
  //   - Only resets the in-progress board when the row/column count actually
  //     changes (e.g. switching orientation on mobile or a major window resize).
  //     Minor resizes that only change cell pixel size no longer wipe the game.
  var resizeTimer = null;
  window.addEventListener('resize', function() {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      resizeTimer = null;
  updateLabels();

  // Keyboard navigation. Active element is the focused cell button.
  // Arrow keys move focus (with wraparound), Space/Enter reveal,
  // F toggles flag, Escape triggers new game.
  document.addEventListener('keydown', function(e) {
    var el = document.activeElement;
    if (!el || !el.classList || !el.classList.contains('cell')) return;
    var r = parseInt(el.dataset.r, 10);
    var c = parseInt(el.dataset.c, 10);
    if (isNaN(r) || isNaN(c)) return;
    var nr = r, nc = c;
    if (e.key === 'ArrowUp') nr = (r - 1 + R) % R;
    else if (e.key === 'ArrowDown') nr = (r + 1) % R;
    else if (e.key === 'ArrowLeft') nc = (c - 1 + C) % C;
    else if (e.key === 'ArrowRight') nc = (c + 1) % C;
    else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      // Treat Enter on a revealed number as chord (matches dblClick).
      var cl = board[r][c];
      if (e.key === 'Enter' && cl.rev && cl.num > 0) dblClick(r, c);
      else if (e.key === ' ') leftClick(r, c);
      else leftClick(r, c);
      return;
    }
    else if (e.key === 'f' || e.key === 'F') { rightClick(r, c); return; }
    else if (e.key === 'Escape') { newGame(); return; }
    else return;
    e.preventDefault();
    var next = getCell(nr, nc); if (next) next.focus();
  });
      var ad = adaptCfg(D[diff]);
      var dimsChanged = (ad.rows !== R || ad.cols !== C);
      cellSz = ad.cellSize;
      applySize();
      if (!dimsChanged) return; // keep current game intact

      // Dimensions changed -> we have to reset (board shape no longer matches).
      R = ad.rows; C = ad.cols; M = ad.mines;
      board = []; over = false; won = false; first = true; flags = 0;
      stopT(); sec = 0; updT(); updC();
      setFace('\uD83D\uDE42');
      for (var r = 0; r < R; r++) {
        board[r] = [];
        for (var c = 0; c < C; c++) board[r][c] = { mine:false, num:0, rev:false, flg:false, hit:false };
      }
      render();
    }, 150);
  });

  // Init hint text for touch devices
  if (IS_TOUCH) {
    document.querySelectorAll('.hint .d').forEach(function(e) { e.style.display = 'none'; });
    document.querySelectorAll('.hint .m').forEach(function(e) { e.style.display = 'inline'; });
  }

  updateLabels();

  window.newGame = newGame;
  window.setDifficulty = setDifficulty;
  window.toggleMode = toggleMode;
  window.toggleSfx = toggleSfx;
  window.facePress = facePress;
  window.faceRelease = faceRelease;

  newGame();
})();
</script>
</body>
</html>
